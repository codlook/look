version: "3.9"

services:
  mysql:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: testpass
      MYSQL_DATABASE: testdb
      MYSQL_USER: looktest
      MYSQL_PASSWORD: testpass
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-ptestpass"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  look-fcgi-test:
    image: look-builder
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/src
    working_dir: /src/build-linux
    command: >
      bash -c "
        echo '=== Phase 9.5: FastCGI+MySQL on Linux ===' &&
        SCRIPT_FILENAME=/src/test_linux_fcgi_mysql.lk ./look-fcgi --port 9000 &
        FCGI_PID=$! &&
        sleep 3 &&
        echo 'look-fcgi started' &&
        python3 /src/test_fcgi_client.py 127.0.0.1 9000 / &&
        echo '--- /insert ---' &&
        python3 /src/test_fcgi_client.py 127.0.0.1 9000 /insert &&
        echo '--- /select ---' &&
        python3 /src/test_fcgi_client.py 127.0.0.1 9000 /select &&
        kill $FCGI_PID 2>/dev/null; true
      "
